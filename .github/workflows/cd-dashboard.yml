name: Dashboard CI/CD

on:
  pull_request:
    paths:
      - "dashboard-ui/**"
  push:
    branches: [main]
    paths:
      - "dashboard-ui/**"

defaults:
  run:
    working-directory: dashboard-ui

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # ─── Build & Test (runs on both PR and push) ────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dashboard-ui/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: dashboard-dist
          path: dashboard-ui/dist

  # ─── Preview Deploy (PR only) ──────────────────────────────────────
  preview:
    name: Deploy Preview
    needs: build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dashboard-ui/package-lock.json

      - run: npm ci
      - run: npx vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
      - run: npx vercel build --token=${{ secrets.VERCEL_TOKEN }}
      - id: deploy
        run: |
          URL=$(npx vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Comment PR with preview links
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            const body = [
              '### 🚀 Dashboard Preview Deployed',
              '',
              `| Page | Link |`,
              `|------|------|`,
              `| Landing | [${url}](${url}) |`,
              `| SRE Product | [${url}/products/sre](${url}/products/sre) |`,
              `| SOC Product | [${url}/products/soc](${url}/products/soc) |`,
              `| FinOps Product | [${url}/products/finops](${url}/products/finops) |`,
              `| Compliance Product | [${url}/products/compliance](${url}/products/compliance) |`,
              `| Pricing | [${url}/pricing](${url}/pricing) |`,
              `| Demo Mode | [${url}/app?demo=true](${url}/app?demo=true) |`,
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  # ─── Production Deploy (main push only) ────────────────────────────
  production:
    name: Deploy Production
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dashboard-ui/package-lock.json

      - run: npm ci
      - run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - run: npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - run: npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
